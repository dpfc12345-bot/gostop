name: gostop-dev

# Local development dependencies only (Postgres + Redis).
# Production runs the same roles on AWS: RDS PostgreSQL + ElastiCache Redis.

services:
  postgres:
    image: postgres:16-alpine
    container_name: gostop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gostop
      POSTGRES_PASSWORD: gostop
      POSTGRES_DB: gostop
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gostop -d gostop']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gostop-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
